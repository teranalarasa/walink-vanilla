                    class="country-search"
                    placeholder="Search country or dial code..." />

                    type="tel"
                    inputmode="numeric"
                    autocomplete="tel"
                    id="phone-input"
                    class="phone-input"
                    placeholder="e.g. 0812 3456 7890" />

              </div>
